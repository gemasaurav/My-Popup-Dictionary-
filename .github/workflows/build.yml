name: Build APK

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Unzip project source (handles nested zips too)
        run: |
          unzip -o files.zip -d extracted
          # Keep unzipping any .zip files found inside, up to 5 passes deep
          for i in 1 2 3 4 5; do
            FOUND=$(find extracted -name "*.zip")
            if [ -z "$FOUND" ]; then
              break
            fi
            echo "$FOUND" | while read -r z; do
              echo "Unzipping nested archive: $z"
              unzip -o "$z" -d extracted
              rm -f "$z"
            done
          done
          echo "----- Final extracted contents -----"
          find extracted -maxdepth 5

      - name: Locate project folder
        id: locate
        run: |
          SETTINGS_FILE=$(find extracted -name "settings.gradle" -o -name "settings.gradle.kts" | head -n 1)
          if [ -z "$SETTINGS_FILE" ]; then
            echo "Could not find settings.gradle anywhere inside the zip!"
            find extracted
            exit 1
          fi
          PROJECT_DIR=$(dirname "$SETTINGS_FILE")
          echo "Found project at: $PROJECT_DIR"
          echo "project_dir=$PROJECT_DIR" >> "$GITHUB_OUTPUT"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Build debug APK
        working-directory: ${{ steps.locate.outputs.project_dir }}
        run: gradle assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: my-popup-dictionary-apk
          path: ${{ steps.locate.outputs.project_dir }}/app/build/outputs/apk/debug/app-debug.apk
