name: Build APK

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Unzip project source
        run: |
          unzip -o files.zip -d extracted
          echo "----- Extracted contents -----"
          find extracted -maxdepth 4

      - name: Locate project folder
        id: locate
        run: |
          SETTINGS_FILE=$(find extracted -name "settings.gradle" -o -name "settings.gradle.kts" | head -n 1)
          if [ -z "$SETTINGS_FILE" ]; then
            echo "Could not find settings.gradle anywhere inside the zip!"
            find extracted
            exit 1
          fi
          PROJECT_DIR=$(dirname "$SETTINGS_FILE")
          echo "Found project at: $PROJECT_DIR"
          echo "project_dir=$PROJECT_DIR" >> "$GITHUB_OUTPUT"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Build debug APK
        working-directory: ${{ steps.locate.outputs.project_dir }}
        run: gradle assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: my-popup-dictionary-apk
          path: ${{ steps.locate.outputs.project_dir }}/app/build/outputs/apk/debug/app-debug.apk
